<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>비밀번호 변경</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="container">
    <header class="page-header">
      <h1>간단한 게시판</h1>
      <nav class="nav">
        <a href="./list.html">게시글 목록</a>
        <a href="./create.html">게시글 등록</a>
        <a href="./change-password.html" class="active">비밀번호 변경</a>
      </nav>
      <div id="authArea" class="auth-area"></div>
    </header>

    <section class="card">
      <h2>비밀번호 변경</h2>
      <form id="changePasswordForm">
        <div class="form-group">
          <label for="currentPassword">현재 비밀번호</label>
          <input type="password" id="currentPassword" placeholder="현재 비밀번호를 입력하세요" />
        </div>
        <div class="form-group">
          <label for="newPassword">새 비밀번호</label>
          <input type="password" id="newPassword" placeholder="새 비밀번호를 입력하세요" />
        </div>
        <div class="form-group">
          <label for="confirmPassword">새 비밀번호 확인</label>
          <input type="password" id="confirmPassword" placeholder="새 비밀번호를 다시 입력하세요" />
        </div>
        <div class="button-group">
          <button type="submit">변경하기</button>
          <a href="./list.html" class="button-link secondary">목록으로</a>
        </div>
      </form>
    </section>
  </div>

  <script src="../js/api/usersApi.js"></script>
  <script src="../js/utils/auth.js"></script>
  <script src="../js/pages/change-password.js"></script>
</body>
</html>
