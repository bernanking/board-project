<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>게시글 등록</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="container">
    <header class="page-header">
      <h1>간단한 게시판</h1>
      <nav class="nav">
        <a href="./list.html">게시글 목록</a>
        <a href="./create.html" class="active">게시글 등록</a>
        <a href="./login.html">로그인</a>
        <a href="./signup.html">회원가입</a>
      </nav>
      <div id="authArea" class="auth-area"></div>
    </header>

    <section class="card">
      <h2>게시글 등록</h2>

      <div class="form-group">
        <label for="title">제목</label>
        <input type="text" id="title" placeholder="제목을 입력하세요" />
      </div>

      <div class="form-group">
        <label for="writer">작성자</label>
        <input type="text" id="writer" placeholder="로그인한 아이디가 자동 표시됩니다." readonly />
      </div>

      <div class="form-group">
        <label for="content">내용</label>
        <textarea id="content" rows="8" placeholder="내용을 입력하세요"></textarea>
      </div>

      <div class="button-group">
        <button id="saveBtn">등록하기</button>
        <a href="./list.html" class="button-link secondary">목록으로</a>
      </div>
    </section>
  </div>

  <script src="../js/api/postsApi.js"></script>
  <script src="../js/api/usersApi.js"></script>
  <script src="../js/utils/auth.js"></script>
  <script src="../js/pages/create.js"></script>
</body>
</html>
