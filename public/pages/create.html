<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>게시글 등록</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="app-body">
  <div class="container py-4 py-lg-5">
    <header class="app-header mb-4">
      <div class="d-flex flex-column gap-3">
        <div class="d-flex justify-content-between align-items-start flex-wrap gap-3">
          <div>
            <h1 class="h3 mb-1">간단한 게시판</h1>
            <p class="text-secondary mb-0">새 게시글을 작성해 다른 사용자와 내용을 공유해보세요.</p>
          </div>
          <div id="authArea" class="auth-area d-none"></div>
        </div>
        <nav class="nav nav-pills app-nav gap-2">
          <a href="./list.html" class="nav-link">게시글 목록</a>
          <a href="./create.html" class="nav-link active">게시글 등록</a>
        </nav>
      </div>
    </header>

    <main class="row justify-content-center">
      <div class="col-12 col-xl-10">
        <section class="card page-card shadow-sm border-0">
          <div class="card-body p-4">
            <h2 class="h4 mb-2">게시글 등록</h2>
            <p class="page-guide mb-4">작성이 끝나면 방금 등록한 게시글 상세 화면으로 이동합니다.</p>
            <form id="createForm">
              <div class="mb-3">
                <label for="title" class="form-label">제목</label>
                <input type="text" id="title" class="form-control" placeholder="제목을 입력하세요" />
              </div>

              <div class="mb-3">
                <label for="writer" class="form-label">작성자</label>
                <input type="text" id="writer" class="form-control" placeholder="로그인한 아이디가 자동 표시됩니다." readonly />
              </div>

              <div class="mb-4">
                <label for="content" class="form-label">내용</label>
                <textarea id="content" rows="10" class="form-control" placeholder="내용을 입력하세요"></textarea>
              </div>

              <div class="d-flex flex-wrap gap-2 justify-content-end">
                <a href="./list.html" class="btn btn-outline-secondary">목록으로</a>
                <button id="saveBtn" type="submit" class="btn btn-primary">게시글 등록하기</button>
              </div>
            </form>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>
  <script src="../js/api/postsApi.js"></script>
  <script src="../js/api/usersApi.js"></script>
  <script src="../js/utils/auth.js"></script>
  <script src="../js/pages/create.js"></script>
</body>
</html>
