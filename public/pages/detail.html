<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>게시글 상세</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="app-body">
  <div class="container py-4 py-lg-5">
    <header class="app-header mb-4">
      <div class="d-flex flex-column gap-3">
        <div class="d-flex justify-content-between align-items-start flex-wrap gap-3">
          <div>
            <h1 class="h3 mb-1">간단한 게시판</h1>
            <p class="text-secondary mb-0">게시글 내용을 읽고, 내 글이라면 수정하거나 삭제할 수 있습니다.</p>
          </div>
          <div id="authArea" class="auth-area d-none"></div>
        </div>
        <nav class="nav nav-pills app-nav gap-2">
          <a href="./list.html" class="nav-link active">게시글 목록</a>
        </nav>
      </div>
    </header>

    <main class="row">
      <div class="col-12">
        <section class="card page-card shadow-sm border-0">
          <div class="card-body p-4">
            <h2 class="h4 mb-4">게시글 상세</h2>

            <div id="detailBox" class="detail-box">
              게시글 정보를 불러오는 중입니다.
            </div>

            <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mt-4">
              <a href="./list.html" class="btn btn-outline-secondary">목록으로</a>
              <div id="ownerActions" class="owner-actions d-flex flex-wrap gap-2" hidden>
                <a id="editLink" href="#" class="btn btn-outline-primary">이 글 수정하기</a>
                <button id="deleteBtn" class="btn btn-danger">이 글 삭제하기</button>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>
  <script src="../js/api/postsApi.js"></script>
  <script src="../js/api/usersApi.js"></script>
  <script src="../js/utils/url.js"></script>
  <script src="../js/utils/auth.js"></script>
  <script src="../js/pages/detail.js"></script>
</body>
</html>
