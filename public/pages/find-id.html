<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아이디 찾기</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="container">
    <header class="page-header">
      <h1>간단한 게시판</h1>
      <nav class="nav">
        <a href="./list.html">게시글 목록</a>
        <a href="./login.html">로그인</a>
        <a href="./signup.html">회원가입</a>
        <a href="./find-id.html" class="active">아이디 찾기</a>
      </nav>
      <div id="authArea" class="auth-area"></div>
    </header>

    <section class="card">
      <h2>아이디 찾기</h2>
      <form id="findIdForm">
        <div class="form-group">
          <label for="name">이름</label>
          <input type="text" id="name" placeholder="이름을 입력하세요" />
        </div>
        <div class="form-group">
          <label for="email">이메일</label>
          <input type="email" id="email" placeholder="이메일을 입력하세요" />
        </div>
        <div class="button-group">
          <button type="submit">아이디 찾기</button>
          <a href="./login.html" class="button-link secondary">로그인으로</a>
        </div>
      </form>
      <p id="resultBox" class="result-box"></p>
    </section>
  </div>

  <script src="../js/api/usersApi.js"></script>
  <script src="../js/utils/auth.js"></script>
  <script src="../js/pages/find-id.js"></script>
</body>
</html>
