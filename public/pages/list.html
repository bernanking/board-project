<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>게시글 목록</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="app-body">
  <div class="container py-4 py-lg-5">
    <header class="app-header mb-4">
      <div class="d-flex flex-column gap-3">
        <div class="d-flex justify-content-between align-items-start flex-wrap gap-3">
          <div>
            <h1 class="h3 mb-1">간단한 게시판</h1>
            <p class="text-secondary mb-0">로그인한 사용자만 사용할 수 있는 게시글 공간입니다.</p>
          </div>
          <div id="authArea" class="auth-area d-none"></div>
        </div>
        <nav class="nav nav-pills app-nav gap-2">
          <a href="list.html" class="nav-link active">게시글 목록</a>
        </nav>
      </div>
    </header>

    <main class="row">
      <div class="col-12">
        <section class="card page-card shadow-sm border-0">
          <div class="card-body p-4">
            <div class="section-top mb-4">
              <div>
                <h2 class="h4 mb-1">게시글 목록</h2>
                <p class="page-guide mb-0">제목을 클릭하면 상세 화면으로 이동합니다.</p>
              </div>
              <a id="writeLink" href="create.html" class="btn btn-primary" style="display: none;">게시글 등록</a>
            </div>

            <div class="table-responsive">
              <table class="table table-hover align-middle post-table mb-0">
                <thead class="table-light">
                  <tr>
                    <th>번호</th>
                    <th>제목</th>
                    <th>작성자</th>
                    <th>작성일</th>
                    <th>조회수</th>
                  </tr>
                </thead>
                <tbody id="postList"></tbody>
              </table>
            </div>

            <p id="emptyMessage" class="empty-message mb-0 mt-4" style="display: none;">
              아직 등록된 게시글이 없습니다.
            </p>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>
  <script src="../js/api/postsApi.js"></script>
  <script src="../js/api/usersApi.js"></script>
  <script src="../js/utils/auth.js"></script>
  <script src="../js/pages/list.js"></script> 
</body>
</html>
