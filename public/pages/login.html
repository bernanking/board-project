<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="app-body">
  <div class="container py-4 py-lg-5">
    <header class="app-header mb-4">
      <div class="d-flex flex-column gap-3">
        <div class="d-flex justify-content-between align-items-start flex-wrap gap-3">
          <div>
            <h1 class="h3 mb-1">간단한 게시판</h1>
            <p class="text-secondary mb-0">SQLite + Express 학습용 게시판</p>
          </div>
          <div id="authArea" class="auth-area d-none"></div>
        </div>
        <nav class="nav nav-pills app-nav gap-2">
          <a href="./login.html" class="nav-link active">로그인</a>
        </nav>
      </div>
    </header>

    <main class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-5">
        <section class="card page-card shadow-sm border-0">
          <div class="card-body p-4 p-lg-5">
            <h2 class="h4 mb-2">로그인</h2>
            <p class="page-guide mb-4">로그인 후 게시글 목록으로 이동할 수 있습니다.</p>
            <form id="loginForm">
              <div class="mb-3">
                <label for="username" class="form-label">아이디</label>
                <input type="text" id="username" class="form-control" placeholder="아이디를 입력하세요" />
              </div>
              <div class="mb-3">
                <label for="password" class="form-label">비밀번호</label>
                <input type="password" id="password" class="form-control" placeholder="비밀번호를 입력하세요" />
              </div>
              <div class="form-check mb-4">
                <input type="checkbox" id="rememberMe" class="form-check-input" />
                <label class="form-check-label" for="rememberMe">로그인 유지</label>
              </div>
              <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary">로그인하고 목록 보기</button>
              </div>
            </form>
            <div class="mt-4 text-center">
              <p class="page-guide mb-2">계정이 없거나 아이디가 기억나지 않나요?</p>
              <div class="d-grid gap-2 d-sm-flex justify-content-center">
                <a href="./signup.html" class="btn btn-outline-secondary">회원가입</a>
                <a href="./find-id.html" class="btn btn-outline-secondary">아이디 찾기</a>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>
  <script src="../js/api/usersApi.js"></script>
  <script src="../js/utils/auth.js"></script>
  <script src="../js/pages/login.js"></script>
</body>
</html>
