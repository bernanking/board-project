<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="container">
    <header class="page-header">
      <h1>간단한 게시판</h1>
      <nav class="nav">
        <a href="./list.html">게시글 목록</a>
        <a href="./login.html" class="active">로그인</a>
        <a href="./signup.html">회원가입</a>
        <a href="./find-id.html">아이디 찾기</a>
      </nav>
      <div id="authArea" class="auth-area"></div>
    </header>

    <section class="card">
      <h2>로그인</h2>
      <form id="loginForm">
        <div class="form-group">
          <label for="username">아이디</label>
          <input type="text" id="username" placeholder="아이디를 입력하세요" />
        </div>
        <div class="form-group">
          <label for="password">비밀번호</label>
          <input type="password" id="password" placeholder="비밀번호를 입력하세요" />
        </div>
        <label class="checkbox-row">
          <input type="checkbox" id="rememberMe" />
          로그인 유지
        </label>
        <div class="button-group">
          <button type="submit">로그인</button>
          <a href="./signup.html" class="button-link secondary">회원가입</a>
          <a href="./find-id.html" class="button-link secondary">아이디 찾기</a>
        </div>
      </form>
    </section>
  </div>

  <script src="../js/api/usersApi.js"></script>
  <script src="../js/utils/auth.js"></script>
  <script src="../js/pages/login.js"></script>
</body>
</html>
