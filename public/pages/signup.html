<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="app-body">
  <div class="container py-4 py-lg-5">
    <header class="app-header mb-4">
      <div class="d-flex flex-column gap-3">
        <div class="d-flex justify-content-between align-items-start flex-wrap gap-3">
          <div>
            <h1 class="h3 mb-1">간단한 게시판</h1>
            <p class="text-secondary mb-0">SQLite + Express 학습용 게시판</p>
          </div>
          <div id="authArea" class="auth-area d-none"></div>
        </div>
        <nav class="nav nav-pills app-nav gap-2">
          <a href="./login.html" class="nav-link">로그인</a>
          <a href="./signup.html" class="nav-link active">회원가입</a>
        </nav>
      </div>
    </header>

    <main class="row justify-content-center">
      <div class="col-12 col-md-9 col-lg-6">
        <section class="card page-card shadow-sm border-0">
          <div class="card-body p-4 p-lg-5">
            <h2 class="h4 mb-2">회원가입</h2>
            <p class="page-guide mb-4">회원가입을 완료하면 로그인 화면으로 이동합니다.</p>
            <form id="signupForm">
              <div class="mb-3">
                <label for="username" class="form-label">아이디</label>
                <input type="text" id="username" class="form-control" placeholder="아이디를 입력하세요" />
              </div>
              <div class="mb-3">
                <label for="password" class="form-label">비밀번호</label>
                <input type="password" id="password" class="form-control" placeholder="비밀번호를 입력하세요" />
              </div>
              <div class="mb-3">
                <label for="confirmPassword" class="form-label">비밀번호 확인</label>
                <input type="password" id="confirmPassword" class="form-control" placeholder="비밀번호를 다시 입력하세요" />
              </div>
              <div class="mb-3">
                <label for="name" class="form-label">이름</label>
                <input type="text" id="name" class="form-control" placeholder="이름을 입력하세요" />
              </div>
              <div class="mb-4">
                <label for="email" class="form-label">이메일</label>
                <input type="email" id="email" class="form-control" placeholder="이메일을 입력하세요" />
              </div>
              <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary">회원가입 완료하기</button>
              </div>
            </form>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>
  <script src="../js/api/usersApi.js"></script>
  <script src="../js/utils/auth.js"></script>
  <script src="../js/pages/signup.js"></script>
</body>
</html>
